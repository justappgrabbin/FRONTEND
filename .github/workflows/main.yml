name: Unzip and scaffold repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip files
        run: |
          for zip in $(find . -maxdepth 2 -name "*.zip"); do
            echo "Unzipping $zip"
            unzip -o "$zip" -d "$(dirname $zip)"
            rm "$zip"
          done

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: unzip and scaffold files"
          git push
