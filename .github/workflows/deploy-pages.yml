name: Deploy Resonance ZIP to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site from uploaded ZIP or HTML
        shell: bash
        run: |
          set -euo pipefail

          rm -rf public extracted
          mkdir -p public extracted

          ZIP_FILE=$(find . -maxdepth 2 -type f -name '*.zip' | head -n 1 || true)

          if [ -n "$ZIP_FILE" ]; then
            echo "Found ZIP: $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d extracted
          else
            echo "No ZIP found. Looking for HTML files."
            find . -maxdepth 3 -type f \( -name '*.html' -o -name '*.htm' \) -not -path './public/*' -exec cp {} extracted/ \;
          fi

          HTML_FILE=$(find extracted -type f -iname '*beef*morphos*.html' | head -n 1 || true)

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*resonance*final*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*grapesjs*webstudio*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f \( -iname '*.html' -o -iname '*.htm' \) | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            echo "ERROR: No HTML file found to deploy."
            echo "Files found:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Deploying HTML: $HTML_FILE"
          cp "$HTML_FILE" public/index.html

          mkdir -p public/source-vault
          cp -R extracted/. public/source-vault/ || true

          touch public/.nojekyll

          printf '%s\n' '{' '  "name": "Resonance Beef MorphOS",' '  "deployment": "github-pages",' '  "source": "uploaded zip unpacked by workflow",' '  "runtime": "offline-first frontend with optional backend enhancement"' '}' > public/deploy-info.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
