name: Deploy Resonance MorphOS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages artifact from uploaded ZIP or HTML
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public

          ZIP_FILE=""
          if ls *.zip >/dev/null 2>&1; then
            ZIP_FILE="$(ls -1 *.zip | head -n 1)"
            echo "Found ZIP: $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d extracted
            HTML_FILE="$(find extracted -type f \( -name '*.html' -o -name '*.htm' \) | head -n 1)"
            if [ -z "$HTML_FILE" ]; then
              echo "No HTML file found inside ZIP."
              exit 1
            fi
            echo "Using HTML: $HTML_FILE"
            cp "$HTML_FILE" public/index.html
            cp -R extracted/* public/source-extracted/ || true
          elif [ -f "index.html" ]; then
            echo "Using existing index.html"
            cp index.html public/index.html
          else
            HTML_FILE="$(find . -maxdepth 2 -type f \( -name '*.html' -o -name '*.htm' \) | head -n 1)"
            if [ -z "$HTML_FILE" ]; then
              echo "No ZIP or HTML file found. Upload the Resonance package ZIP or an index.html file."
              exit 1
            fi
            echo "Using HTML: $HTML_FILE"
            cp "$HTML_FILE" public/index.html
          fi

          cat > public/.nojekyll <<'EOF'
EOF

          cat > public/deploy-info.json <<'EOF'
          {
            "name": "Resonance Beef MorphOS",
            "mode": "static-offline-first",
            "backend": "optional-enhancement",
            "notes": "Built from uploaded canonical package. ZIP source is preserved in repository when uploaded."
          }
EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
