name: Unzip and scaffold Resonance repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Unzip package and choose morphing substrate index
        shell: bash
        run: |
          set -euo pipefail

          echo "Cleaning old generated folders and placeholder index"
          rm -f index.html
          rm -rf extracted source-vault

          ZIP_FILE=$(find . -maxdepth 4 -type f -name '*.zip' | head -n 1 || true)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found."
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Unzipping: $ZIP_FILE"
          mkdir -p extracted
          unzip -o "$ZIP_FILE" -d extracted

          echo "HTML files found:"
          find extracted -type f \( -iname '*.html' -o -iname '*.htm' \) | sort

          HTML_FILE=$(find extracted -type f -iname 'resonance-beef-morphos.html' | head -n 1 || true)

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*beef*morphos*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*morph*substrate*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*unified*substrate*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname 'resonance-phonyos-final.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*resonance*final*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f -iname '*grapesjs*webstudio*.html' | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            HTML_FILE=$(find extracted -type f \( -iname '*.html' -o -iname '*.htm' \) | head -n 1 || true)
          fi

          if [ -z "$HTML_FILE" ]; then
            echo "ERROR: No HTML found inside ZIP."
            exit 1
          fi

          echo "Selected morphing substrate: $HTML_FILE"
          cp "$HTML_FILE" index.html

          mkdir -p source-vault
          cp -R extracted/. source-vault/

          touch .nojekyll

          printf '%s\n' \
            '{' \
            '  "name": "Resonance Morphing Substrate",' \
            '  "entry": "index.html",' \
            '  "sourceVault": "source-vault",' \
            '  "deployment": "static repo scaffold",' \
            '  "backend": "optional enhancement"' \
            '}' > deploy-info.json

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A
          git status
          git diff --cached --quiet || git commit -m "chore: unpack Resonance package and set substrate index"
          git push
